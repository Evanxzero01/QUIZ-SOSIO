<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sosiologi Quiz — PSAJ 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0533;
    --card: #26064a;
    --accent1: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --accent5: #c77dff;
    --text: #f0e6ff;
    --muted: #a98bc7;
    --correct: #6bcb77;
    --wrong: #ff6b6b;
    --opt-a: #4d96ff;
    --opt-b: #ff6b6b;
    --opt-c: #ffd93d;
    --opt-d: #6bcb77;
    --opt-e: #c77dff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(77,150,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(199,125,255,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 10%, rgba(255,107,107,0.1) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) infinite ease-in-out;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: var(--max-op); transform: scale(1.3); }
  }

  /* SCREENS */
  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .screen.hidden { display: none; }

  /* ---- HOME SCREEN ---- */
  .home-card {
    text-align: center;
    max-width: 600px;
    width: 100%;
  }

  .logo-badge {
    display: inline-block;
    background: linear-gradient(135deg, #c77dff, #4d96ff);
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .home-title {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(40px, 8vw, 72px);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ffd93d 0%, #ff6b6b 40%, #c77dff 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .home-sub {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .home-meta {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 24px 0 36px;
  }

  .meta-chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
  }

  .meta-chip span { opacity: 0.7; font-weight: 600; }

  .btn-start {
    background: linear-gradient(135deg, #ff6b6b, #ffd93d);
    color: #1a0533;
    border: none;
    padding: 18px 52px;
    border-radius: 50px;
    font-size: 20px;
    font-weight: 900;
    font-family: 'Baloo 2', cursive;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 30px rgba(255,107,107,0.4);
    letter-spacing: 0.5px;
  }

  .btn-start:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 14px 40px rgba(255,107,107,0.5);
  }

  .btn-start:active { transform: scale(0.97); }

  /* ---- QUIZ SCREEN ---- */
  .quiz-wrap {
    width: 100%;
    max-width: 780px;
    margin: 0 auto;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .q-counter {
    font-family: 'Baloo 2', cursive;
    font-size: 18px;
    font-weight: 800;
    color: var(--muted);
  }

  .q-counter strong {
    color: var(--text);
    font-size: 22px;
  }

  .score-pill {
    background: rgba(255,217,61,0.15);
    border: 2px solid var(--accent2);
    padding: 6px 20px;
    border-radius: 30px;
    font-weight: 800;
    font-size: 16px;
    color: var(--accent2);
  }

  /* Progress bar */
  .progress-track {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4d96ff, #c77dff);
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* Timer */
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .timer-circle {
    width: 52px;
    height: 52px;
    position: relative;
  }

  .timer-circle svg {
    transform: rotate(-90deg);
    width: 52px;
    height: 52px;
  }

  .timer-circle circle {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
  }

  .timer-bg { stroke: rgba(255,255,255,0.1); }
  .timer-fg {
    stroke: var(--accent2);
    stroke-dasharray: 126;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }

  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 16px;
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border-radius: 24px;
    padding: 32px 36px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: slideUp 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #4d96ff, #c77dff, #ff6b6b);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-topic {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent5);
    margin-bottom: 14px;
  }

  .q-text {
    font-size: clamp(15px, 2.5vw, 18px);
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
  }

  /* Options grid */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    animation: slideUp 0.5s ease 0.1s both;
  }

  @media (max-width: 520px) {
    .options-grid { grid-template-columns: 1fr; }
    .q-card { padding: 22px 20px; }
  }

  .opt-btn {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    position: relative;
    overflow: hidden;
  }

  .opt-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
  }

  .opt-btn:disabled { cursor: not-allowed; }

  .opt-label {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .opt-btn[data-opt="A"] .opt-label { background: rgba(77,150,255,0.25); color: var(--opt-a); }
  .opt-btn[data-opt="B"] .opt-label { background: rgba(255,107,107,0.25); color: var(--opt-b); }
  .opt-btn[data-opt="C"] .opt-label { background: rgba(255,217,61,0.25); color: var(--opt-c); }
  .opt-btn[data-opt="D"] .opt-label { background: rgba(107,203,119,0.25); color: var(--opt-d); }
  .opt-btn[data-opt="E"] .opt-label { background: rgba(199,125,255,0.25); color: var(--opt-e); }

  .opt-btn.correct {
    background: rgba(107,203,119,0.2);
    border-color: var(--correct);
    animation: correctPop 0.4s ease;
  }

  .opt-btn.correct .opt-label {
    background: var(--correct);
    color: #1a0533;
  }

  .opt-btn.wrong {
    background: rgba(255,107,107,0.2);
    border-color: var(--wrong);
    animation: shake 0.4s ease;
  }

  .opt-btn.wrong .opt-label {
    background: var(--wrong);
    color: white;
  }

  @keyframes correctPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Feedback banner */
  .feedback-banner {
    border-radius: 16px;
    padding: 14px 20px;
    margin-bottom: 16px;
    font-weight: 800;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideUp 0.3s ease;
  }

  .feedback-banner.correct-fb {
    background: rgba(107,203,119,0.15);
    border: 2px solid var(--correct);
    color: var(--correct);
  }

  .feedback-banner.wrong-fb {
    background: rgba(255,107,107,0.15);
    border: 2px solid var(--wrong);
    color: var(--wrong);
  }

  .feedback-banner.hidden { display: none; }

  .fb-icon { font-size: 22px; }

  /* Next button */
  .btn-next {
    width: 100%;
    background: linear-gradient(135deg, #4d96ff, #c77dff);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 900;
    font-family: 'Baloo 2', cursive;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 24px rgba(77,150,255,0.35);
    margin-top: 8px;
    letter-spacing: 0.5px;
    display: none;
  }

  .btn-next.visible {
    display: block;
    animation: slideUp 0.3s ease;
  }

  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(77,150,255,0.45);
  }

  /* Streak badge */
  .streak-badge {
    position: fixed;
    top: 24px;
    right: 24px;
    background: linear-gradient(135deg, #ffd93d, #ff6b6b);
    color: #1a0533;
    padding: 10px 20px;
    border-radius: 30px;
    font-family: 'Baloo 2', cursive;
    font-weight: 800;
    font-size: 18px;
    z-index: 100;
    display: none;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 6px 20px rgba(255,107,107,0.4);
  }

  @keyframes popIn {
    from { transform: scale(0) translateY(-20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* ---- RESULT SCREEN ---- */
  .result-card {
    text-align: center;
    max-width: 580px;
    width: 100%;
  }

  .result-emoji {
    font-size: 80px;
    margin-bottom: 16px;
    animation: bounce 0.6s ease;
    display: block;
  }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .result-title {
    font-family: 'Baloo 2', cursive;
    font-size: 38px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ffd93d, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .result-sub { color: var(--muted); font-size: 16px; margin-bottom: 32px; font-weight: 600; }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 32px;
  }

  .stat-box {
    background: var(--card);
    border-radius: 20px;
    padding: 20px 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .stat-num {
    font-family: 'Baloo 2', cursive;
    font-size: 36px;
    font-weight: 800;
    display: block;
    margin-bottom: 4px;
  }

  .stat-num.green { color: var(--correct); }
  .stat-num.red { color: var(--wrong); }
  .stat-num.yellow { color: var(--accent2); }

  .stat-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .score-ring {
    width: 150px;
    height: 150px;
    margin: 0 auto 28px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
    width: 150px;
    height: 150px;
  }

  .score-ring circle { fill: none; stroke-width: 10; stroke-linecap: round; }
  .ring-bg { stroke: rgba(255,255,255,0.08); }
  .ring-fg {
    stroke: var(--accent2);
    stroke-dasharray: 408;
    stroke-dashoffset: 408;
    transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1) 0.5s;
  }

  .score-ring-num {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-pct {
    font-family: 'Baloo 2', cursive;
    font-size: 38px;
    font-weight: 800;
    color: var(--text);
  }

  .ring-label { font-size: 12px; font-weight: 700; color: var(--muted); }

  .btn-retry {
    background: linear-gradient(135deg, #ff6b6b, #ffd93d);
    color: #1a0533;
    border: none;
    padding: 16px 42px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 900;
    font-family: 'Baloo 2', cursive;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 25px rgba(255,107,107,0.35);
  }

  .btn-retry:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(255,107,107,0.45); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall var(--dur2) ease-in forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Particles on correct */
  .burst {
    position: fixed;
    pointer-events: none;
    z-index: 200;
  }

  .burst-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: burstOut var(--dur3) ease-out forwards;
  }

  @keyframes burstOut {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<!-- Streak badge -->
<div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">0</span> Streak!</div>

<!-- HOME SCREEN -->
<div class="screen" id="homeScreen">
  <div class="home-card">
    <div class="logo-badge">✦ Quiz Time ✦</div>
    <h1 class="home-title">Sosiologi<br>Quiz</h1>
    <p class="home-sub">PSAJ Kelas XII · SMA Negeri 1 Wanasari</p>
    <p style="color:var(--muted);font-size:14px;">Tahun Ajaran 2024/2025</p>
    <div class="home-meta">
      <div class="meta-chip">📚 <span>Soal:</span> 45 PG + 5 Uraian</div>
      <div class="meta-chip">⏱️ <span>Per soal:</span> 30 detik</div>
      <div class="meta-chip">🏆 <span>Streak</span> bonus!</div>
    </div>
    <button class="btn-start" onclick="startQuiz()">Mulai Quiz! 🚀</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="screen hidden" id="quizScreen">
  <div class="quiz-wrap">
    <div class="topbar">
      <div class="q-counter">Soal <strong id="qNum">1</strong> / <span id="qTotal">45</span></div>
      <div class="timer-wrap">
        <div class="timer-circle">
          <svg viewBox="0 0 52 52">
            <circle class="timer-bg" cx="26" cy="26" r="20"/>
            <circle class="timer-fg" id="timerCircle" cx="26" cy="26" r="20"/>
          </svg>
          <div class="timer-num" id="timerNum">30</div>
        </div>
      </div>
      <div class="score-pill">⭐ <span id="scoreDisplay">0</span></div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="q-card">
      <div class="q-topic" id="qTopic">Pengantar Sosiologi</div>
      <div class="q-text" id="qText"></div>
    </div>

    <div class="feedback-banner hidden" id="feedbackBanner">
      <span class="fb-icon" id="fbIcon"></span>
      <span id="fbText"></span>
    </div>

    <div class="options-grid" id="optionsGrid"></div>

    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Lanjut →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="screen hidden" id="resultScreen">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <h2 class="result-title" id="resultTitle">Luar Biasa!</h2>
    <p class="result-sub" id="resultSub">Kamu berhasil menyelesaikan quiz!</p>

    <div class="score-ring">
      <svg viewBox="0 0 150 150">
        <circle class="ring-bg" cx="75" cy="75" r="65"/>
        <circle class="ring-fg" id="ringFg" cx="75" cy="75" r="65"/>
      </svg>
      <div class="score-ring-num">
        <span class="ring-pct" id="ringPct">0%</span>
        <span class="ring-label">Skor</span>
      </div>
    </div>

    <div class="result-stats">
      <div class="stat-box">
        <span class="stat-num green" id="statCorrect">0</span>
        <span class="stat-label">✓ Benar</span>
      </div>
      <div class="stat-box">
        <span class="stat-num red" id="statWrong">0</span>
        <span class="stat-label">✗ Salah</span>
      </div>
      <div class="stat-box">
        <span class="stat-num yellow" id="statScore">0</span>
        <span class="stat-label">⭐ Poin</span>
      </div>
    </div>

    <button class="btn-retry" onclick="retryQuiz()">🔄 Main Lagi</button>
  </div>
</div>

<script>
const questions = [
  {
    topic: "Ciri-Ciri Sosiologi",
    text: "Perhatikan ciri-ciri sosiologi berikut ini:\n1) Didasarkan pada observasi terhadap kenyataan dengan akal sehat dan tidak spekulatif\n2) Menggunakan metode kuantitatif berdasarkan perhitungan matematis\n3) Realitas sebagai dasar menyusun teori baru untuk penyempurnaan teori lama\n4) Data diolah secara subjektif di mana imajinasi pribadi masuk dalam data\n5) Fakta dianalisis secara kritis tanpa memperhatikan baik buruknya fakta\n\nPernyataan di atas yang merupakan ciri-ciri sosiologi adalah...",
    options: { A:"1), 2), dan 3)", B:"1), 2), dan 4)", C:"1), 3), dan 5)", D:"2), 4), dan 5)", E:"3), 4), dan 5)" },
    answer: "C"
  },
  {
    topic: "Fungsi Sosiologi",
    text: "Sosiologi dapat digunakan dalam kajian yang lebih luas, yaitu meliputi perencanaan suatu program pembangunan yang sesuai dengan kebutuhan masyarakat. Dari uraian tersebut maka fungsi sosiologi adalah membantu dalam merencanakan...",
    options: { A:"Penelitian dan kontrol sosial", B:"Pembangunan dan analisis", C:"Penelitian dan analisis", D:"Pembangunan dan kontrol sosial", E:"Pembangunan dan penelitian" },
    answer: "E"
  },
  {
    topic: "Faktor Interaksi Sosial",
    text: "Beberapa remaja berusaha untuk tampil sama persis dengan tokoh yang dikagumi. Dalam proses interaksi sosial tersebut sangat dipengaruhi oleh faktor...",
    options: { A:"Identifikasi", B:"Simpati", C:"Motivasi", D:"Empati", E:"Sugesti" },
    answer: "A"
  },

// Generate stars
function generateStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const dur = (Math.random() * 4 + 2).toFixed(1);
    const delay = (Math.random() * 5).toFixed(1);
    const maxOp = (Math.random() * 0.5 + 0.2).toFixed(2);
    star.style.cssText = `width:${size}px;height:${size}px;left:${x}%;top:${y}%;--dur:${dur}s;--max-op:${maxOp};animation-delay:${delay}s`;
    container.appendChild(star);
  }
}

function startQuiz() {
  currentQ = 0; score = 0; correctCount = 0; wrongCount = 0; streak = 0;
  document.getElementById('homeScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  document.getElementById('qTotal').textContent = questions.length;
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('qTopic').textContent = q.topic;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('progressFill').style.width = `${(currentQ / questions.length) * 100}%`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';

  const colors = ['A','B','C','D','E'];
  colors.forEach(key => {
    if (!q.options[key]) return;
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.setAttribute('data-opt', key);
    btn.innerHTML = `<div class="opt-label">${key}</div><span>${q.options[key]}</span>`;
    btn.onclick = () => selectAnswer(key, btn);
    grid.appendChild(btn);
  });

  document.getElementById('feedbackBanner').className = 'feedback-banner hidden';
  document.getElementById('btnNext').className = 'btn-next';

  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMER_MAX;
  updateTimer();

  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        timeUp();
      }
    }
  }, 1000);
}

function updateTimer() {
  document.getElementById('timerNum').textContent = timeLeft;
  const offset = CIRCUMFERENCE - (timeLeft / TIMER_MAX) * CIRCUMFERENCE;
  const circle = document.getElementById('timerCircle');
  circle.style.strokeDashoffset = offset;
  if (timeLeft <= 10) circle.style.stroke = '#ff6b6b';
  else if (timeLeft <= 20) circle.style.stroke = '#ffd93d';
  else circle.style.stroke = '#c77dff';
}

function timeUp() {
  answered = true;
  streak = 0;
  updateStreak();
  showFeedback(false, `⏰ Waktu habis! Jawaban: ${questions[currentQ].answer}`);
  revealAnswer(questions[currentQ].answer, null);
  document.getElementById('btnNext').className = 'btn-next visible';
}

function selectAnswer(key, btn) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const correct = questions[currentQ].answer;
  const isCorrect = key === correct;

  if (isCorrect) {
    const timeBonus = Math.ceil(timeLeft / 3);
    const pts = 100 + timeBonus;
    score += pts;
    correctCount++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    btn.classList.add('correct');
    showFeedback(true, `✓ Benar! +${pts} poin${timeBonus > 0 ? ` (${timeBonus} bonus waktu)` : ''}`);
    spawnBurst(btn);
    updateStreak();
  } else {
    wrongCount++;
    streak = 0;
    updateStreak();
    btn.classList.add('wrong');
    showFeedback(false, `✗ Salah! Jawaban yang benar: ${correct}`);
    revealAnswer(correct, btn);
  }

  document.getElementById('btnNext').className = 'btn-next visible';
}

function revealAnswer(correctKey, wrongBtn) {
  document.querySelectorAll('.opt-btn').forEach(b => {
    if (b.getAttribute('data-opt') === correctKey) {
      b.classList.add('correct');
    }
    b.disabled = true;
  });
}

function showFeedback(isCorrect, msg) {
  const banner = document.getElementById('feedbackBanner');
  const icon = document.getElementById('fbIcon');
  const text = document.getElementById('fbText');
  banner.className = `feedback-banner ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;
  icon.textContent = isCorrect ? '🎉' : '💡';
  text.textContent = msg;
}

function updateStreak() {
  const badge = document.getElementById('streakBadge');
  const num = document.getElementById('streakNum');
  if (streak >= 3) {
    num.textContent = streak;
    badge.style.display = 'block';
    badge.style.animation = 'none';
    badge.offsetHeight;
    badge.style.animation = 'popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';
  } else {
    badge.style.display = 'none';
  }
}

function spawnBurst(btn) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const colors = ['#ffd93d', '#6bcb77', '#4d96ff', '#ff6b6b', '#c77dff'];
  const burst = document.createElement('div');
  burst.className = 'burst';
  burst.style.cssText = `left:${cx}px;top:${cy}px;`;
  for (let i = 0; i < 12; i++) {
    const dot = document.createElement('div');
    dot.className = 'burst-dot';
    const angle = (i / 12) * Math.PI * 2;
    const dist = 50 + Math.random() * 40;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const dur = (0.5 + Math.random() * 0.3).toFixed(2);
    dot.style.cssText = `background:${colors[i%colors.length]};--tx:${tx}px;--ty:${ty}px;--dur3:${dur}s;`;
    burst.appendChild(dot);
  }
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 800);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('streakBadge').style.display = 'none';

  const pct = Math.round((correctCount / questions.length) * 100);
  let emoji = '😢', title = 'Coba Lagi!', sub = 'Pelajari kembali materi dan coba lagi ya!';
  if (pct >= 90) { emoji = '🏆'; title = 'Luar Biasa!'; sub = 'Kamu layak jadi juara sosiologi!'; }
  else if (pct >= 75) { emoji = '🎉'; title = 'Bagus Sekali!'; sub = 'Hampir sempurna! Sedikit lagi!'; }
  else if (pct >= 60) { emoji = '😊'; title = 'Lumayan Nih!'; sub = 'Terus belajar, kamu pasti bisa lebih baik!'; }
  else if (pct >= 40) { emoji = '🤔'; title = 'Perlu Belajar Lagi'; sub = 'Review materinya ya, masih banyak yang perlu dipahami.'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  document.getElementById('statScore').textContent = score;
  document.getElementById('ringPct').textContent = '0%';

  setTimeout(() => {
    document.getElementById('ringPct').textContent = pct + '%';
    const circumference = 408;
    const offset = circumference - (pct / 100) * circumference;
    document.getElementById('ringFg').style.strokeDashoffset = offset;
    const ringColor = pct >= 75 ? '#6bcb77' : pct >= 50 ? '#ffd93d' : '#ff6b6b';
    document.getElementById('ringFg').style.stroke = ringColor;
  }, 300);

  if (pct >= 70) spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#ffd93d','#ff6b6b','#6bcb77','#4d96ff','#c77dff','#ffffff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const size = Math.random() * 10 + 6;
      const x = Math.random() * 100;
      const dur = (Math.random() * 2 + 2).toFixed(1);
      const delay = (Math.random() * 1.5).toFixed(1);
      piece.style.cssText = `
        left:${x}%;top:-20px;
        width:${size}px;height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        --dur2:${dur}s;
        animation-delay:${delay}s;
        transform:rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), (parseFloat(dur)+parseFloat(delay)+0.5)*1000);
    }, i * 30);
  }
}

function retryQuiz() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('homeScreen').classList.remove('hidden');
}

generateStars();
</script>
